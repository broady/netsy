name: CI

on:
  push:
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      - uses: golangci/golangci-lint-action@v8
      - name: Test
        run: go test -v -race -coverprofile=coverage.out ./...
      - uses: codecov/codecov-action@v5
        with:
          files: coverage.out
